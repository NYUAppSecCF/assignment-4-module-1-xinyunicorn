name: Android CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Make gradlew executable
        working-directory: GiftcardSite
        run: chmod +x gradlew

      - name: Build project with Gradle
        working-directory: GiftcardSite
        run: ./gradlew build